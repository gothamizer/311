name: Refresh and deploy dashboard

on:
  workflow_dispatch:
  schedule:
    # GitHub cron is UTC; 11:00 UTC is 7am Eastern during daylight saving time.
    - cron: '0 11 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy.yml'
      - 'index.html'
      - 'package-lock.json'
      - 'package.json'
      - 'public/**'
      - 'scripts/**'
      - 'src/**'
      - 'tsconfig*.json'
      - 'vite.config.ts'

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore dashboard aggregate cache
        uses: actions/cache@v4
        with:
          path: .dashboard-cache
          key: dashboard-aggregates-${{ github.run_id }}
          restore-keys: |
            dashboard-aggregates-

      - name: Refresh dashboard data
        if: github.event_name != 'push'
        env:
          NYC_OPENDATA_APP_TOKEN: ${{ secrets.NYC_OPENDATA_APP_TOKEN }}
          NYC_OPEN_DATA_APP_TOKEN: ${{ secrets.NYC_OPEN_DATA_APP_TOKEN }}
        run: npm run refresh:data

      - name: Validate dashboard data
        run: npm run validate:data

      - name: Build static site
        run: GITHUB_PAGES=true VITE_HASH_ROUTER=true npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
